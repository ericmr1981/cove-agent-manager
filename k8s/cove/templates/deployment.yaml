apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cove.fullname" . }}
  labels:
    app: {{ include "cove.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "cove.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "cove.name" . }}
    spec:
      containers:
        - name: cove
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          env:
            - name: COVE_DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: COVE_REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379/0"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
